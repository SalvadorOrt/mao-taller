<div class="modal fade" id="modalCategoria" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Nueva categoría</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <label class="field-label">Nombre</label>
                <input id="categoriaNombre" type="text" class="form-control-apple">

                <label class="field-label" style="margin-top:12px;">Prefijo SKU</label>
                <input id="categoriaPrefijo" type="text" class="form-control-apple">
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-login" data-bs-dismiss="modal">
                    Cancelar
                </button>

                <button type="button" class="btn-login primary" onclick="guardarCategoria()">
                    Guardar
                </button>
            </div>

        </div>
    </div>
</div>
