{% extends "base.html" %}
{% load static %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<style>
    .form-card {
        background: #fff;
        border: 1px solid var(--border-soft);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        max-width: 1000px;
        margin: 0 auto;
    }

    .form-section {
        background: #fbfbfd;
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 20px;
    }

    .form-grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .form-grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 15px;
    }

    .field-label {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        font-weight: 700;
        display: block;
        margin-bottom: 5px;
    }

    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
    }

    .select2-container .select2-selection--single {
        height: 42px;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        padding: 6px 8px;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow {
        height: 40px;
    }

    .preview-grid {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 12px;
    }

    .preview-grid img {
        width: 95px;
        height: 75px;
        object-fit: cover;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        background: #fff;
    }
    
    .checkbox-group {
        margin-top: 15px; 
        display: flex; 
        gap: 18px; 
        flex-wrap: wrap;
        align-items: center;
    }
</style>

<div class="form-card">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div>
            <h2 style="margin:0; color:var(--primary); font-weight:800;">
                Nuevo Repuesto
            </h2>
            <p style="margin:4px 0 0 0; color:var(--muted); font-size:0.9rem;">
                Crear producto base, código comercial, barcode, presentación e imágenes.
            </p>
        </div>

        <a href="{% url 'inventario_catalogo' %}" class="btn-login" style="width:auto;">
            Volver
        </a>
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-section">
            <h4 style="margin:0 0 15px 0;">Datos del producto base</h4>

            <div class="form-grid-3">
                <div>
                    <label class="field-label">SKU Interno (Opcional)</label>
                    <input type="text"
                           name="sku_interno"
                           class="form-control-apple"
                           placeholder="Dejar vacío para autogenerar"
                           style="text-transform:uppercase;">
                </div>
                <div>
                    <label class="field-label">Categoría</label>
                    <select name="categoria" class="form-control-apple select2" required>
                        <option value="">Seleccione categoría...</option>
                        {% for categoria in categorias %}
                            <option value="{{ categoria.id }}">{{ categoria.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="field-label">Origen de creación</label>
                    <select name="origen" class="form-control-apple">
                        {% for valor, texto in origenes_producto %}
                            <option value="{{ valor }}">{{ texto }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div style="margin-top:15px;">
                <label class="field-label">Nombre base del repuesto</label>
                <input type="text"
                       name="nombre_base"
                       class="form-control-apple"
                       placeholder="Ej. Filtro de aceite Toyota Hilux"
                       required
                       style="text-transform:uppercase;">
            </div>

            <div style="margin-top:15px;">
                <label class="field-label">Descripción</label>
                <textarea name="descripcion"
                          class="form-control-apple"
                          placeholder="Descripción opcional..."
                          style="min-height:80px;"></textarea>
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="producto_activo" checked>
                    Producto Activo
                </label>
                <label>
                    <input type="checkbox" name="datos_incompletos">
                    Datos incompletos
                </label>
                <label>
                    <input type="checkbox" name="descontinuado">
                    Descontinuado
                </label>
            </div>
        </div>

        <div class="form-section">
            <h4 style="margin:0 0 15px 0;">Código comercial</h4>
            
            <div class="form-grid-3">
                <div>
                    <label class="field-label">Marca</label>
                    <select name="marca" class="form-control-apple select2" required>
                        <option value="">Seleccione marca...</option>
                        {% for marca in marcas %}
                            <option value="{{ marca.id }}">{{ marca.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="field-label">Tipo de código</label>
                    <select name="tipo_codigo" class="form-control-apple">
                        {% for valor, texto in tipos_codigo %}
                            <option value="{{ valor }}">{{ texto }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="field-label">Código del repuesto</label>
                    <input type="text"
                           name="codigo"
                           class="form-control-apple"
                           placeholder="Ej. WIX-51394"
                           required
                           style="text-transform:uppercase; font-weight:bold;">
                </div>
            </div>

            <div class="form-grid-2" style="margin-top:15px;">
                <div>
                    <label class="field-label">Código de barras</label>
                    <input type="text"
                           name="codigo_barras"
                           class="form-control-apple"
                           placeholder="Escanee o escriba el barcode"
                           autofocus>
                </div>
                <div>
                    <label class="field-label">Nombre comercial (Opcional)</label>
                    <input type="text"
                           name="nombre_comercial"
                           class="form-control-apple"
                           placeholder="Nombre visible en mostrador o factura">
                </div>
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="codigo_activo" checked>
                    Código Activo para la venta
                </label>
            </div>
        </div>

        <div class="form-section">
            <h4 style="margin:0 0 15px 0;">Presentación</h4>

            <div class="form-grid-2">
                <div>
                    <label class="field-label">Cantidad presentación</label>
                    <input type="number"
                           name="presentacion_cantidad"
                           class="form-control-apple"
                           step="0.01"
                           min="0"
                           placeholder="Ej. 1, 2, 12">
                </div>

                <div>
                    <label class="field-label">Unidad</label>
                    <input type="text"
                           name="presentacion_unidad"
                           class="form-control-apple"
                           placeholder="UND, PAR, KIT, LT, ML">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h4 style="margin:0 0 15px 0;">Precios</h4>

            <div class="form-grid-3">
                <div>
                    <label class="field-label">Precio compra</label>
                    <input type="number"
                           name="precio_compra"
                           class="form-control-apple"
                           step="0.01"
                           min="0"
                           placeholder="0.00">
                </div>

                <div>
                    <label class="field-label">Precio venta</label>
                    <input type="number"
                           name="precio_venta"
                           class="form-control-apple"
                           step="0.01"
                           min="0"
                           placeholder="0.00">
                </div>

                <div>
                    <label class="field-label">Margen %</label>
                    <input type="number"
                           name="margen_ganancia_porcentaje"
                           class="form-control-apple"
                           step="0.01"
                           min="0"
                           value="100.00">
                </div>
            </div>

            <div style="margin-top:15px;">
                <label class="field-label">IVA costo %</label>
                <input type="number"
                       name="porcentaje_iva_costo"
                       class="form-control-apple"
                       step="0.01"
                       min="0"
                       value="0.00">
            </div>
        </div>

        <div class="form-section">
            <h4 style="margin:0 0 15px 0;">Imágenes</h4>

            <input type="file"
                   name="imagenes"
                   id="imagenes"
                   class="form-control-apple"
                   accept="image/*"
                   multiple>

            <div id="preview_imagenes" class="preview-grid"></div>
        </div>

        <div class="form-actions">
            <a href="{% url 'inventario_catalogo' %}" class="btn-login" style="width:auto; text-decoration:none;">
                Cancelar
            </a>

            <button type="submit" class="btn-login primary" style="width:auto; padding:0 22px;">
                Guardar Repuesto
            </button>
        </div>

    </form>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    $(document).ready(function () {
        $('.select2').select2({
            width: '100%',
            placeholder: 'Buscar...',
            allowClear: true
        });
    });

    const inputImagenes = document.getElementById('imagenes');
    const preview = document.getElementById('preview_imagenes');
    const dt = new DataTransfer();

    if (inputImagenes) {
        inputImagenes.addEventListener('change', function () {
            Array.from(this.files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    dt.items.add(file);
                }
            });

            this.files = dt.files;
            actualizarPreview();
        });
    }

    function actualizarPreview() {
        preview.innerHTML = ''; 
        
        Array.from(inputImagenes.files).forEach((file, index) => {
            const imgContainer = document.createElement('div');
            imgContainer.style.position = 'relative';
            imgContainer.style.display = 'inline-block';

            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            
            const btnEliminar = document.createElement('button');
            btnEliminar.innerHTML = '×';
            btnEliminar.style.position = 'absolute';
            btnEliminar.style.top = '-5px';
            btnEliminar.style.right = '-5px';
            btnEliminar.style.background = '#ff3b30';
            btnEliminar.style.color = 'white';
            btnEliminar.style.border = 'none';
            btnEliminar.style.borderRadius = '50%';
            btnEliminar.style.width = '20px';
            btnEliminar.style.height = '20px';
            btnEliminar.style.cursor = 'pointer';
            btnEliminar.style.fontSize = '14px';
            btnEliminar.style.lineHeight = '1';
            btnEliminar.style.padding = '0';
            btnEliminar.style.display = 'flex';
            btnEliminar.style.alignItems = 'center';
            btnEliminar.style.justifyContent = 'center';
            btnEliminar.style.boxShadow = '0 2px 4px rgba(0,0,0,0.2)';

            btnEliminar.onclick = function(e) {
                e.preventDefault(); 
                eliminarArchivo(index);
            };

            imgContainer.appendChild(img);
            imgContainer.appendChild(btnEliminar);
            preview.appendChild(imgContainer);
        });
    }

    function eliminarArchivo(index) {
        const dtNuevo = new DataTransfer();
        const files = inputImagenes.files;
        
        for (let i = 0; i < files.length; i++) {
            if (i !== index) {
                dtNuevo.items.add(files[i]);
            }
        }
        
        inputImagenes.files = dtNuevo.files;
        dt.items.clear();
        for (let i = 0; i < dtNuevo.files.length; i++) {
            dt.items.add(dtNuevo.files[i]);
        }
        
        actualizarPreview();
    }
</script>

{% endblock %}
