<div class="ot-card" style="margin-top: 15px;">
    <div class="ot-card-header">
        <h3>Recomendaciones técnicas</h3>
    </div>

    <div class="ot-card-body">
        <div id="contenedorRecomendaciones">
            {% for rec in orden.recomendaciones_items.all %}
            <div class="recomendacion-item" style="border:1px solid #e5e5ea;border-radius:10px;padding:12px;margin-bottom:10px;">
                <input type="hidden" name="recomendacion_id[]" value="{{ rec.plantilla.id|default:'' }}">

                <input type="text"
                       name="recomendacion_titulo[]"
                       value="{{ rec.titulo }}"
                       class="form-control"
                       placeholder="Título"
                       {% if not puede_editar %}readonly{% endif %}>

                <textarea name="recomendacion_texto[]"
                          class="form-control"
                          rows="5"
                          style="margin-top:8px;"
                          {% if not puede_editar %}readonly{% endif %}>{{ rec.texto }}</textarea>

                {% if puede_editar %}
                <button type="button"
                        class="btn-login btn-eliminar-recomendacion"
                        style="margin-top:10px;background:#ff3b30;border-color:#ff3b30;">
                    Eliminar
                </button>
                {% endif %}
            </div>
            {% empty %}
                <p class="texto-sin-recomendaciones" style="color:#6e6e73;">
                    No hay recomendaciones técnicas registradas.
                </p>
            {% endfor %}
        </div>

        {% if puede_editar %}
        <button type="button"
                class="btn-login"
                id="btnAgregarRecomendacion">
            + Agregar recomendación
        </button>
        {% endif %}
    </div>
</div>
