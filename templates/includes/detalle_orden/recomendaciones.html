<style>
#tablaRecomendaciones{
    width:100%;
    table-layout:fixed;
}

#tablaRecomendaciones td,
#tablaRecomendaciones th{
    vertical-align:top;
}

#tablaRecomendaciones .form-control-apple{
    width:100%;
}

.recomendacion-textarea{
    width:100%;
    min-height:72px;
    resize:vertical;
}

.recomendacion-eliminada{
    display:none !important;
}

</style>

<div class="ot-card">
    <div class="section-title" style="display:flex; justify-content:space-between; align-items:center; padding-right:10px;">
        <span>Recomendaciones técnicas</span>

        {% if puede_editar %}
            <button type="button"
                    class="btn-login"
                    onclick="agregarFilaRecomendacionOT()">
                + Agregar recomendación
            </button>
        {% endif %}
    </div>

    <div class="ot-table-wrap">
        <table class="ot-table" id="tablaRecomendaciones">
            <thead>
                <tr>
                    <th style="width:24%;">Título</th>
                    <th style="width:64%;">Recomendación</th>
                    <th style="width:12%;">Acción</th>
                </tr>
            </thead>

            <tbody id="contenedorRecomendaciones">
                {% for rec in orden.recomendaciones_items.all %}
                <tr class="recomendacion-item">
                    <td>
                        <input type="hidden" name="recomendacion_detalle_id[]" value="{{ rec.id }}">
                        <input type="hidden" name="recomendacion_delete[]" value="0">
                        <input type="hidden" name="recomendacion_actualizado_en[]" value="{{ rec.actualizado_en|date:'c' }}">

                        <input type="hidden"
                               name="recomendacion_id[]"
                               value="{{ rec.plantilla.id|default:'' }}">

                        <input type="text"
                               name="recomendacion_titulo[]"
                               value="{{ rec.titulo }}"
                               class="form-control-apple"
                               placeholder="Título"
                               {% if not puede_editar %}readonly{% endif %}>
                    </td>

                    <td>
                        <textarea name="recomendacion_texto[]"
                                  class="form-control-apple recomendacion-textarea"
                                  rows="3"
                                  placeholder="Texto de recomendación"
                                  {% if not puede_editar %}readonly{% endif %}>{{ rec.texto }}</textarea>
                    </td>

                    <td style="text-align:center;">
                        {% if puede_editar %}
                            <button type="button"
                                    class="btn-login danger small"
                                    onclick="eliminarFilaRecomendacionOT(this);"
                                    title="Quitar">
                                ✕
                            </button>
                        {% else %}
                            <span style="background:#f5f5f7; color:#86868b; padding:4px 8px; border-radius:6px; font-weight:700; font-size:9px; border:1px solid #e5e5ea;">
                                FIJO
                            </span>
                        {% endif %}
                    </td>
                </tr>
                {% empty %}
                <tr class="texto-sin-recomendaciones">
                    <td colspan="3" style="text-align:center; color:#86868b; padding:14px;">
                        No hay recomendaciones técnicas registradas.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
const PUEDE_EDITAR_RECOMENDACIONES = ("{{ puede_editar|yesno:'true,false' }}" === "true");

function agregarFilaRecomendacionOT() {
    if (!PUEDE_EDITAR_RECOMENDACIONES) return;

    const tbody = document.querySelector("#tablaRecomendaciones tbody");
    if (!tbody) return;

    const filaVacia = tbody.querySelector(".texto-sin-recomendaciones");

    if (filaVacia) {
        filaVacia.remove();
    }

    const filaHtml = `
        <tr class="recomendacion-item">
            <td>
                <input type="hidden" name="recomendacion_detalle_id[]" value="">
                <input type="hidden" name="recomendacion_delete[]" value="0">
                <input type="hidden" name="recomendacion_actualizado_en[]" value="">

                <input type="hidden" name="recomendacion_id[]" value="">

                <input type="text"
                       name="recomendacion_titulo[]"
                       class="form-control-apple"
                       placeholder="Título">
            </td>

            <td>
                <textarea name="recomendacion_texto[]"
                          class="form-control-apple recomendacion-textarea"
                          rows="3"
                          placeholder="Texto de recomendación"></textarea>
            </td>

            <td style="text-align:center;">
                <button type="button"
                        class="btn-login danger small"
                        onclick="eliminarFilaRecomendacionOT(this);">
                    ✕
                </button>
            </td>
        </tr>
    `;

    tbody.insertAdjacentHTML("beforeend", filaHtml);
}

function eliminarFilaRecomendacionOT(boton) {
    if (!PUEDE_EDITAR_RECOMENDACIONES) return;

    const fila = boton.closest("tr");
    if (!fila) return;

    const detalleId = fila.querySelector('input[name="recomendacion_detalle_id[]"]');
    const deleteInput = fila.querySelector('input[name="recomendacion_delete[]"]');

    if (detalleId && detalleId.value) {
        if (deleteInput) {
            deleteInput.value = "1";
        }

        fila.classList.add("recomendacion-eliminada");
        fila.style.display = "none";
    } else {
        fila.remove();
    }

    const tbody = document.querySelector("#tablaRecomendaciones tbody");
    if (!tbody) return;

    const visibles = Array.from(tbody.querySelectorAll(".recomendacion-item"))
        .filter(item => !item.classList.contains("recomendacion-eliminada"));

    if (visibles.length === 0 && !tbody.querySelector(".texto-sin-recomendaciones")) {
        tbody.insertAdjacentHTML("beforeend", `
            <tr class="texto-sin-recomendaciones">
                <td colspan="3" style="text-align:center; color:#86868b; padding:14px;">
                    No hay recomendaciones técnicas registradas.
                </td>
            </tr>
        `);
    }
}
</script>
