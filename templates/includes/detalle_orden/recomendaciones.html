<style>

#tablaRecomendaciones{
    width:100%;
    table-layout:fixed;
}

#tablaRecomendaciones td,
#tablaRecomendaciones th{
    vertical-align:top;
}

#tablaRecomendaciones .form-control-apple{
    width:100%;
}

.recomendacion-textarea{
    width:100%;
    min-height:72px;
    resize:vertical;
}

</style>

<div class="ot-card">
    <div class="section-title" style="display:flex; justify-content:space-between; align-items:center; padding-right:10px;">
        <span>Recomendaciones técnicas</span>

        {% if puede_editar %}
            <button type="button"
        class="btn-login"
        onclick="agregarFilaRecomendacionOT(true)">
                + Agregar recomendación
            </button>
        {% endif %}
    </div>

    <div class="ot-table-wrap">
        <table class="ot-table" id="tablaRecomendaciones">
            <thead>
                <tr>
                    <th style="width:24%;">Título</th>
                    <th style="width:64%;">Recomendación</th>
                    <th style="width:12%;">Acción</th>
                </tr>
            </thead>

            <tbody id="contenedorRecomendaciones">
                {% for rec in orden.recomendaciones_items.all %}
                <tr class="recomendacion-item">
                    <td>
                        <input type="hidden"
                               name="recomendacion_id[]"
                               value="{{ rec.plantilla.id|default:'' }}">

                        <input type="text"
                               name="recomendacion_titulo[]"
                               value="{{ rec.titulo }}"
                               class="form-control-apple"
                               placeholder="Título"
                               {% if not puede_editar %}readonly{% endif %}>
                    </td>

                    <td>
                        <textarea name="recomendacion_texto[]"
                                  class="form-control-apple recomendacion-textarea"
                                  rows="3"
                                  placeholder="Texto de recomendación"
                                  {% if not puede_editar %}readonly{% endif %}>{{ rec.texto }}</textarea>
                    </td>

                    <td style="text-align:center;">
                        {% if puede_editar %}
                            <button type="button"
                                    class="btn-login danger small btn-eliminar-recomendacion"
                                    title="Quitar">
                                ✕
                            </button>
                        {% else %}
                            <span style="background:#f5f5f7; color:#86868b; padding:4px 8px; border-radius:6px; font-weight:700; font-size:9px; border:1px solid #e5e5ea;">
                                FIJO
                            </span>
                        {% endif %}
                    </td>
                </tr>
                {% empty %}
                <tr class="texto-sin-recomendaciones">
                    <td colspan="3" style="text-align:center; color:#86868b; padding:14px;">
                        No hay recomendaciones técnicas registradas.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<script>
function agregarFilaRecomendacionOT() {
    const tbody = document.querySelector("#tablaRecomendaciones tbody");

    if (!tbody) {
        alert("No existe la tabla de recomendaciones");
        return;
    }

    const filaVacia = tbody.querySelector(".texto-sin-recomendaciones");
    if (filaVacia) {
        filaVacia.remove();
    }

    const filaHtml = `
        <tr class="recomendacion-item">
            <td>
                <input type="hidden" name="recomendacion_id[]" value="">
                <input type="text"
                       name="recomendacion_titulo[]"
                       class="form-control-apple"
                       placeholder="Título">
            </td>

            <td>
                <textarea name="recomendacion_texto[]"
                          class="form-control-apple recomendacion-textarea"
                          rows="3"
                          placeholder="Texto de recomendación"></textarea>
            </td>

            <td style="text-align:center;">
                <button type="button"
                        class="btn-login danger small"
                        onclick="eliminarFilaRecomendacionOT(this)">
                    ✕
                </button>
            </td>
        </tr>
    `;

    tbody.insertAdjacentHTML("beforeend", filaHtml);
}

function eliminarFilaRecomendacionOT(boton) {
    const fila = boton.closest("tr");

    if (fila) {
        fila.remove();
    }
}
</script>
