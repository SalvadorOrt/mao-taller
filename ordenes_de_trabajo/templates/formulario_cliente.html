{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card p-4 shadow-sm" style="border-radius: 15px;">
        <h3 class="mb-4">Registro de Cliente</h3>
        <form method="POST" id="clienteForm">
            {% csrf_token %}
            <div id="api_mensaje" class="mb-3"></div>

            <!-- BÚSQUEDA Y COSTOS -->
            <div class="row mb-4 align-items-end">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Identificación (Cédula/RUC)</label>
                    <div class="input-group">
                        {{ form.identificacion }}
                        <button type="button" id="btn_buscar_api" class="btn-login">Buscar</button>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check form-switch" id="div_full_toggle">
                        <input class="form-check-input" type="checkbox" id="check_full">
                        <label class="form-check-label" for="check_full">Datos Completos</label>
                    </div>
                </div>
            </div>

            <!-- TODOS LOS CAMPOS DEL MODELO -->
            <div class="row">
                {% for field in form %}
                    {% if field.name != 'identificacion' %}
                        <div class="col-md-4 mb-3">
                            <label class="form-label small fw-bold text-uppercase">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endif %}
                {% endfor %}
            </div>

            <button type="submit" class="btn-login">Guardar Cliente</button>
        </form>

        <!-- PANEL DE VISUALIZACIÓN TÉCNICA (Desplegará TODOS los datos extraídos) -->
        <div id="panel_datos_tecnicos" class="mt-5 p-4 bg-light rounded d-none">
            <h5 class="text-primary mb-3">Información Completa Extraída</h5>
            <div id="contenido_tecnico" class="row"></div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const inputCedula = document.getElementById("id_identificacion");
    const checkFull = document.getElementById("check_full");
    const divFull = document.getElementById("div_full_toggle");
    const btnBuscar = document.getElementById("btn_buscar_api");
    const msg = document.getElementById("api_mensaje");
    const panel = document.getElementById('panel_datos_tecnicos');
    const contenido = document.getElementById('contenido_tecnico');

    // 1. Dinámica RUC (Bloquea Full)
    inputCedula.addEventListener("input", function() {
        if (this.value.trim().length === 13) {
            checkFull.checked = true;
            checkFull.disabled = true;
            divFull.style.opacity = "0.5";
        } else {
            checkFull.disabled = false;
            divFull.style.opacity = "1";
        }
    });

    // 2. Búsqueda y Autocompletado Total
    btnBuscar.addEventListener("click", function() {
        const cedula = inputCedula.value.trim();
        const isFull = checkFull.checked;

        if (isFull && !confirm("¿Confirmas la consulta FULL ($0.05)?")) return;

        btnBuscar.disabled = true;
        msg.innerHTML = '<div class="alert alert-info">Consultando...</div>';

        fetch(`/api/consultar_cedula/?cedula=${cedula}&full=${isFull}`)
            .then(res => res.json())
            .then(data => {
                if (data.exito) {
                    const c = data.cliente;
                    
                    // Llenar inputs del formulario
                    Object.keys(c).forEach(key => {
                        const input = document.getElementsByName(key)[0];
                        if (input && c[key] !== null && c[key] !== "") input.value = c[key];
                    });
                    
                    // Llenar Panel Técnico (Muestra TODOS los datos)
                    panel.classList.remove('d-none');
                    contenido.innerHTML = Object.entries(c).map(([key, val]) => {
                        const valor = (typeof val === 'object') ? JSON.stringify(val) : val;
                        return `<div class="col-md-4 mb-2 small"><strong>${key}:</strong> ${valor || 'N/A'}</div>`;
                    }).join('');

                    msg.innerHTML = '<div class="alert alert-success">Datos cargados exitosamente.</div>';
                } else {
                    msg.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                }
            })
            .finally(() => btnBuscar.disabled = false);
    });
});
</script>
{% endblock %}
